name: Update KBO data

on:
  schedule:
    # cron은 UTC 기준. KST = UTC+9.
    # 01:00~15:00 UTC (= KST 10:00~24:00) 30분마다
    - cron: "*/30 1-15 * * *"
    # 그 외 시간대(KST 01~09시) 매시간
    - cron: "0 0,16,17,18,19,20,21,22,23 * * *"
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape KBO data
        run: node scripts/fetch-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: KBO 데이터 자동 업데이트 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
