name: Update KBO data

on:
  schedule:
    # 1. 매일 아침 9시 (KST) - 오늘의 매치업 및 선발 투수 업데이트
    - cron: "0 0 * * *"
    
    # 2. 매일 오후 2시 ~ 다음날 새벽 1시 (KST) - 5분마다 촘촘하게 감시 (더블헤더, 여름 시간, 우천 지연 모두 커버)
    - cron: "*/5 5-15 * * *"
    
    # 3. 매일 새벽 1시 30분 (KST) - 연장전/지연 종료를 대비해 하루 최종 마무리
    - cron: "30 16 * * *"
    
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape KBO data
        run: node scripts/fetch-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: KBO 데이터 자동 업데이트 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
